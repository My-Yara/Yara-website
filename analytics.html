<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Yara - Early Access Analytics</title>
  <link rel="icon" type="image/png" href="yara_butterfly.png" />
  <link rel="apple-touch-icon" href="yara_butterfly.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;background:#0A0A0A;color:#fff}

    /* Topbar */
    .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06)}
    .topbar .brand{display:flex;align-items:center;gap:8px;text-decoration:none}
    .topbar .brand img{width:24px;height:24px;filter:brightness(0) invert(1)}
    .topbar .brand span{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.02em}
    .topbar .right{display:flex;align-items:center;gap:12px}
    .topbar .user-email{font-size:12px;color:rgba(255,255,255,0.4)}
    .nav-links{display:flex;gap:4px}
    .nav-link{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none;transition:all .15s}
    .nav-link:hover{background:rgba(255,255,255,0.06);color:#fff}
    .nav-link.active{background:rgba(139,92,246,0.15);color:#8B5CF6}
    .btn-sm{padding:5px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
    .btn-sm:hover{background:rgba(255,255,255,0.1);color:#fff}

    .main{max-width:1200px;margin:0 auto;padding:20px}

    /* Date range filter */
    .filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .filter-bar label{font-size:12px;color:rgba(255,255,255,0.4);font-weight:500}
    .date-btn{padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:rgba(255,255,255,0.5);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
    .date-btn:hover{background:rgba(255,255,255,0.08);color:#fff}
    .date-btn.active{background:rgba(139,92,246,0.15);border-color:rgba(139,92,246,0.3);color:#8B5CF6}

    /* Stats cards */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
    .stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px}
    .stat-label{font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
    .stat-value{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:700}
    .stat-sub{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}
    .purple{color:#8B5CF6}.green{color:#22C55E}.amber{color:#F59E0B}.cyan{color:#06B6D4}.rose{color:#F43F5E}

    /* Chart containers */
    .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .chart-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px}
    .chart-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px}

    /* Bar chart (CSS-only) */
    .bar-chart{display:flex;flex-direction:column;gap:8px}
    .bar-row{display:flex;align-items:center;gap:10px}
    .bar-label{font-size:12px;color:rgba(255,255,255,0.5);min-width:100px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar-track{flex:1;height:24px;background:rgba(255,255,255,0.04);border-radius:6px;overflow:hidden;position:relative}
    .bar-fill{height:100%;border-radius:6px;transition:width 0.6s ease;min-width:2px}
    .bar-count{font-size:11px;color:rgba(255,255,255,0.4);min-width:30px;font-variant-numeric:tabular-nums}

    /* Timeline chart */
    .timeline{display:flex;align-items:flex-end;gap:2px;height:120px;padding-top:8px}
    .timeline-bar{flex:1;background:rgba(139,92,246,0.3);border-radius:3px 3px 0 0;transition:height 0.4s ease;min-height:2px;position:relative;cursor:pointer}
    .timeline-bar:hover{background:rgba(139,92,246,0.6)}
    .timeline-bar .tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 8px;font-size:10px;white-space:nowrap;color:rgba(255,255,255,0.7);z-index:10}
    .timeline-bar:hover .tooltip{display:block}
    .timeline-labels{display:flex;gap:2px;margin-top:6px}
    .timeline-labels span{flex:1;text-align:center;font-size:9px;color:rgba(255,255,255,0.2)}

    /* Keyword cloud */
    .keyword-list{display:flex;flex-wrap:wrap;gap:6px}
    .keyword-tag{padding:4px 10px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.15);border-radius:99px;font-size:11px;color:rgba(139,92,246,0.8);white-space:nowrap}
    .keyword-tag.high{background:rgba(139,92,246,0.2);color:#8B5CF6;font-weight:600}

    /* Donut chart (CSS) */
    .donut-wrap{display:flex;align-items:center;gap:20px}
    .donut{width:100px;height:100px;border-radius:50%;position:relative}
    .donut-center{position:absolute;inset:20px;border-radius:50%;background:#0A0A0A;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700}
    .donut-legend{display:flex;flex-direction:column;gap:6px}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.5)}
    .legend-dot{width:8px;height:8px;border-radius:50%}

    /* Response viewer */
    .responses-section{margin-top:20px}
    .responses-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px}
    .response-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px;margin-bottom:8px}
    .response-meta{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
    .response-email{font-weight:500;font-size:13px}
    .response-date{font-size:11px;color:rgba(255,255,255,0.3)}
    .response-loc{font-size:11px;color:rgba(255,255,255,0.25)}
    .response-answers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .answer-block label{font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:3px}
    .answer-block p{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.4}

    /* Auth gate */
    .auth-gate{display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}
    .auth-gate p{color:rgba(255,255,255,0.4);font-size:14px;margin-bottom:16px}
    .btn-login{padding:10px 24px;background:linear-gradient(135deg,#8B5CF6,#7C3AED);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
    .btn-login:hover{box-shadow:0 8px 24px rgba(139,92,246,0.3);transform:translateY(-1px)}

    .spinner-sm{width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:#8B5CF6;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .state-box{padding:48px;text-align:center}
    .state-box p{color:rgba(255,255,255,0.35);font-size:13px}

    @media(max-width:768px){
      .charts-grid{grid-template-columns:1fr}
      .response-answers{grid-template-columns:1fr}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .bar-label{min-width:60px}
    }
  </style>
</head>
<body>

  <div id="authGate" class="auth-gate" style="display:none;">
    <div>
      <img src="yara_butterfly.png" alt="Yara" style="width:48px;height:48px;filter:brightness(0) invert(1);margin-bottom:20px;">
      <p>You need to sign in to access this page.</p>
      <button class="btn-login" onclick="window.location.href='/login.html?redirect=/analytics.html'">Sign In</button>
    </div>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:16px;">
        <a href="/" class="brand">
          <img src="yara_butterfly.png" alt="Yara" />
          <span>Yara</span>
        </a>
        <div class="nav-links">
          <a href="/admin.html" class="nav-link">Waitlist</a>
          <a href="/analytics.html" class="nav-link active">Analytics</a>
        </div>
      </div>
      <div class="right">
        <span class="user-email" id="userEmail"></span>
        <button class="btn-sm" id="logoutBtn">Sign Out</button>
      </div>
    </div>

    <div class="main">
      <!-- Date range filter -->
      <div class="filter-bar">
        <label>Period:</label>
        <button class="date-btn" data-range="7">7d</button>
        <button class="date-btn" data-range="30" >30d</button>
        <button class="date-btn active" data-range="all">All Time</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-label">Total Signups</div><div class="stat-value purple" id="sTotal">-</div></div>
        <div class="stat-card"><div class="stat-label">Approved</div><div class="stat-value green" id="sApproved">-</div><div class="stat-sub" id="sApprovalRate"></div></div>
        <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value amber" id="sPending">-</div></div>
        <div class="stat-card"><div class="stat-label">This Week</div><div class="stat-value cyan" id="sWeek">-</div></div>
        <div class="stat-card"><div class="stat-label">Countries</div><div class="stat-value purple" id="sCountries">-</div></div>
        <div class="stat-card"><div class="stat-label">Avg / Day</div><div class="stat-value cyan" id="sAvgDay">-</div></div>
      </div>

      <!-- Charts row 1 -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Signups Over Time</div>
          <div id="timelineChart"><div class="state-box"><div class="spinner-sm"></div></div></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Top Locations</div>
          <div id="locationChart"><div class="state-box"><div class="spinner-sm"></div></div></div>
        </div>
      </div>

      <!-- Charts row 2 -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Status Breakdown</div>
          <div id="statusChart"><div class="state-box"><div class="spinner-sm"></div></div></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Top Keywords (Financial Goals)</div>
          <div id="keywordChart"><div class="state-box"><div class="spinner-sm"></div></div></div>
        </div>
      </div>

      <!-- Charts row 3 -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Top Keywords (Rights & Protection)</div>
          <div id="keywordRightsChart"><div class="state-box"><div class="spinner-sm"></div></div></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Top Keywords (Ideal Outcome)</div>
          <div id="keywordOutcomeChart"><div class="state-box"><div class="spinner-sm"></div></div></div>
        </div>
      </div>

      <!-- Recent responses -->
      <div class="responses-section">
        <div class="responses-title">Recent Responses <span id="responseCount" style="color:rgba(255,255,255,0.2)"></span></div>
        <div id="responsesContainer"></div>
      </div>
    </div>
  </div>

  <script>
    const WAITLIST_API = 'https://yara-survey-api.netlify.app/.netlify/functions/list-waitlist';

    let session = null;
    let rawData = [];
    let activeRange = 'all';

    // --- Auth ---
    function checkAuth() {
      const raw = sessionStorage.getItem('yara_auth');
      if (!raw) { document.getElementById('authGate').style.display = 'flex'; return false; }
      try {
        session = JSON.parse(raw);
        if (!session.password) {
          sessionStorage.removeItem('yara_auth');
          window.location.href = '/login.html?v=' + Date.now();
          return false;
        }
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userEmail').textContent = session.email || session.userId;
        return true;
      } catch { document.getElementById('authGate').style.display = 'flex'; return false; }
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('yara_auth');
      window.location.href = '/login.html';
    });

    // --- Fetch data ---
    async function fetchData() {
      try {
        const res = await fetch(WAITLIST_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: session.email || session.userId, password: session.password }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        rawData = await res.json();
        rawData.forEach(e => {
          e._ts = e.timestamp ? new Date(e.timestamp).getTime() : 0;
          e._status = e.status || 'pending';
          e._date = e.timestamp ? new Date(e.timestamp) : null;
        });
        render();
      } catch (err) {
        document.querySelector('.main').innerHTML = '<div class="state-box"><p style="color:#F87171;">' + err.message + '</p></div>';
      }
    }

    // --- Date range filter ---
    function getFiltered() {
      if (activeRange === 'all') return rawData;
      const now = Date.now();
      const ms = parseInt(activeRange) * 86400000;
      return rawData.filter(e => e._ts > now - ms);
    }

    document.querySelectorAll('.date-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeRange = btn.dataset.range;
        render();
      });
    });

    // --- Render all ---
    function render() {
      const data = getFiltered();
      renderStats(data);
      renderTimeline(data);
      renderLocations(data);
      renderStatus(data);
      renderKeywords(data, 'financialGoals', 'keywordChart');
      renderKeywords(data, 'rightsProtection', 'keywordRightsChart');
      renderKeywords(data, 'idealOutcome', 'keywordOutcomeChart');
      renderResponses(data);
    }

    // --- Stats ---
    function renderStats(data) {
      const approved = data.filter(e => e._status === 'approved').length;
      const pending = data.length - approved;

      const now = new Date();
      const weekAgo = new Date(now - 7 * 86400000);
      const thisWeek = data.filter(e => e._date && e._date >= weekAgo).length;

      const countries = new Set();
      data.forEach(e => {
        if (e.location) {
          const parts = e.location.split(',').map(s => s.trim());
          if (parts.length >= 3 && parts[2] !== 'Unknown') countries.add(parts[2]);
        }
      });

      // Avg per day
      let avgDay = 0;
      if (data.length > 1) {
        const sorted = data.filter(e => e._ts > 0).sort((a, b) => a._ts - b._ts);
        if (sorted.length > 1) {
          const days = Math.max(1, (sorted[sorted.length - 1]._ts - sorted[0]._ts) / 86400000);
          avgDay = (sorted.length / days).toFixed(1);
        }
      }

      document.getElementById('sTotal').textContent = data.length;
      document.getElementById('sApproved').textContent = approved;
      document.getElementById('sApprovalRate').textContent = data.length ? Math.round(approved / data.length * 100) + '% rate' : '';
      document.getElementById('sPending').textContent = pending;
      document.getElementById('sWeek').textContent = thisWeek;
      document.getElementById('sCountries').textContent = countries.size;
      document.getElementById('sAvgDay').textContent = avgDay;
    }

    // --- Timeline ---
    function renderTimeline(data) {
      const container = document.getElementById('timelineChart');
      const dated = data.filter(e => e._date);
      if (dated.length === 0) { container.innerHTML = '<div class="state-box"><p>No data</p></div>'; return; }

      // Group by date
      const byDate = {};
      dated.forEach(e => {
        const key = e._date.toISOString().slice(0, 10);
        byDate[key] = (byDate[key] || 0) + 1;
      });

      const dates = Object.keys(byDate).sort();
      // Fill gaps
      if (dates.length > 1) {
        const start = new Date(dates[0]);
        const end = new Date(dates[dates.length - 1]);
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          const key = d.toISOString().slice(0, 10);
          if (!byDate[key]) byDate[key] = 0;
        }
      }

      const sortedDates = Object.keys(byDate).sort();
      const max = Math.max(...Object.values(byDate));

      // Limit to last 60 bars for readability
      const display = sortedDates.slice(-60);

      let barsHtml = '';
      display.forEach(date => {
        const count = byDate[date];
        const pct = max > 0 ? (count / max * 100) : 0;
        const label = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        barsHtml += '<div class="timeline-bar" style="height:' + Math.max(pct, 2) + '%"><div class="tooltip">' + label + ': ' + count + '</div></div>';
      });

      let labelsHtml = '';
      const step = Math.max(1, Math.floor(display.length / 6));
      display.forEach((date, i) => {
        if (i % step === 0 || i === display.length - 1) {
          const label = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          labelsHtml += '<span>' + label + '</span>';
        } else {
          labelsHtml += '<span></span>';
        }
      });

      container.innerHTML = '<div class="timeline">' + barsHtml + '</div><div class="timeline-labels">' + labelsHtml + '</div>';
    }

    // --- Locations ---
    function renderLocations(data) {
      const container = document.getElementById('locationChart');
      const counts = {};
      data.forEach(e => {
        if (!e.location || e.location.includes('Unknown')) return;
        const parts = e.location.split(',').map(s => s.trim());
        // Use country, or city+country if available
        let key = parts.length >= 3 ? parts[2] : parts[parts.length - 1];
        if (parts.length >= 3 && parts[0] !== 'Unknown') key = parts[0] + ', ' + parts[2];
        counts[key] = (counts[key] || 0) + 1;
      });

      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8);
      if (sorted.length === 0) { container.innerHTML = '<div class="state-box"><p>No location data</p></div>'; return; }

      const max = sorted[0][1];
      const colors = ['#8B5CF6', '#06B6D4', '#22C55E', '#F59E0B', '#F43F5E', '#EC4899', '#6366F1', '#14B8A6'];

      let html = '<div class="bar-chart">';
      sorted.forEach(([loc, count], i) => {
        const pct = (count / max * 100).toFixed(1);
        html += '<div class="bar-row">';
        html += '<div class="bar-label" title="' + esc(loc) + '">' + esc(loc) + '</div>';
        html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + colors[i % colors.length] + '"></div></div>';
        html += '<div class="bar-count">' + count + '</div>';
        html += '</div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    // --- Status donut ---
    function renderStatus(data) {
      const container = document.getElementById('statusChart');
      const approved = data.filter(e => e._status === 'approved').length;
      const pending = data.length - approved;
      if (data.length === 0) { container.innerHTML = '<div class="state-box"><p>No data</p></div>'; return; }

      const approvedPct = (approved / data.length * 100);
      const pendingPct = 100 - approvedPct;

      // CSS conic-gradient donut
      const gradient = 'conic-gradient(#22C55E 0deg ' + (approvedPct * 3.6) + 'deg, #F59E0B ' + (approvedPct * 3.6) + 'deg 360deg)';

      let html = '<div class="donut-wrap">';
      html += '<div class="donut" style="background:' + gradient + '"><div class="donut-center">' + data.length + '</div></div>';
      html += '<div class="donut-legend">';
      html += '<div class="legend-item"><div class="legend-dot" style="background:#22C55E"></div>Approved: ' + approved + ' (' + Math.round(approvedPct) + '%)</div>';
      html += '<div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>Pending: ' + pending + ' (' + Math.round(pendingPct) + '%)</div>';
      html += '</div></div>';
      container.innerHTML = html;
    }

    // --- Keywords ---
    function renderKeywords(data, field, containerId) {
      const container = document.getElementById(containerId);
      const stopWords = new Set(['i','me','my','we','our','the','a','an','to','and','of','in','for','is','it','that','on','with','as','be','at','by','from','or','not','but','are','was','this','have','has','had','do','does','did','will','would','could','should','can','may','been','being','more','most','very','just','also','so','than','too','some','all','any','no','if','then','into','about','out','up','what','which','who','when','where','how','each','other','its','these','those','through','over','after','before','between','such','both','same','own','only','get','like','want','need','make','know','take','come','think','see','go','really','things','them','they','their','you','your','feel','am','don\'t','doesn\'t','won\'t','didn\'t','haven\'t','shouldn\'t','wouldn\'t','couldn\'t','isn\'t','aren\'t','wasn\'t','weren\'t']);

      const wordCounts = {};
      data.forEach(e => {
        const text = (e[field] || '').toLowerCase();
        // Extract meaningful phrases (2-3 word combos) and single words
        const words = text.replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 2 && !stopWords.has(w));
        words.forEach(w => { wordCounts[w] = (wordCounts[w] || 0) + 1; });
      });

      const sorted = Object.entries(wordCounts).sort((a, b) => b[1] - a[1]).slice(0, 15);
      if (sorted.length === 0) { container.innerHTML = '<div class="state-box"><p>No data</p></div>'; return; }

      const maxCount = sorted[0][1];
      let html = '<div class="keyword-list">';
      sorted.forEach(([word, count]) => {
        const isHigh = count >= maxCount * 0.6;
        html += '<span class="keyword-tag' + (isHigh ? ' high' : '') + '">' + esc(word) + ' <span style="opacity:0.5">(' + count + ')</span></span>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    // --- Recent responses ---
    function renderResponses(data) {
      const container = document.getElementById('responsesContainer');
      const countEl = document.getElementById('responseCount');
      const recent = data.slice(0, 20); // show last 20
      countEl.textContent = '(showing ' + recent.length + ' of ' + data.length + ')';

      if (recent.length === 0) { container.innerHTML = '<div class="state-box"><p>No responses</p></div>'; return; }

      let html = '';
      recent.forEach(e => {
        const dt = e.timestamp ? fmtDate(new Date(e.timestamp)) : '-';
        const status = e._status === 'approved' ? '<span style="color:#22C55E">Approved</span>' : '<span style="color:#F59E0B">Pending</span>';
        html += '<div class="response-card">';
        html += '<div class="response-meta">';
        html += '<span class="response-email">' + esc(e.email || '-') + '</span>';
        html += '<span class="response-date">' + dt + '</span>';
        html += '<span class="response-loc">' + esc(e.location || '') + '</span>';
        html += status;
        html += '</div>';
        html += '<div class="response-answers">';
        html += '<div class="answer-block"><label>Financial Goals</label><p>' + esc(e.financialGoals || '-') + '</p></div>';
        html += '<div class="answer-block"><label>Rights & Protection</label><p>' + esc(e.rightsProtection || '-') + '</p></div>';
        html += '<div class="answer-block"><label>Ideal Outcome</label><p>' + esc(e.idealOutcome || '-') + '</p></div>';
        html += '</div></div>';
      });
      container.innerHTML = html;
    }

    // --- Helpers ---
    function fmtDate(d) {
      const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const h = d.getHours();
      const m = String(d.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      return mon[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' ' + (h % 12 || 12) + ':' + m + ' ' + ampm;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // --- Init ---
    if (checkAuth()) { fetchData(); }
  </script>

</body>
</html>
