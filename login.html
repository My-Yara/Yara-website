<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Yara - Login</title>
  <link rel="icon" type="image/png" href="yara_butterfly.png" />
  <link rel="apple-touch-icon" href="yara_butterfly.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A0A;
      color: #FFFFFF;
      overflow: hidden;
      position: relative;
    }

    /* Subtle animated gradient background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(139,92,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 0 24px;
    }

    /* Logo + brand */
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 48px;
    }

    .brand img {
      width: 36px;
      height: 36px;
      filter: brightness(0) invert(1);
    }

    .brand span {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #FFFFFF;
    }

    /* Card */
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    .login-card h1 {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      margin-bottom: 6px;
    }

    .login-card .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: #FFFFFF;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .form-group input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .form-group input:focus {
      border-color: rgba(139,92,246,0.5);
      background: rgba(255,255,255,0.08);
    }

    /* Error message */
    .error-msg {
      color: #F87171;
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 18px;
      transition: opacity 0.2s ease;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
      box-shadow: 0 8px 24px rgba(139,92,246,0.3);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(139,92,246,0.2);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Loading spinner inside button */
    .submit-btn .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .spinner { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .divider span {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Back link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: rgba(255,255,255,0.6);
    }

    /* Forgot password */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 13px;
      color: rgba(139,92,246,0.7);
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 20px;
      transition: color 0.2s ease;
    }

    .forgot-link:hover {
      color: rgba(139,92,246,1);
    }

    /* Success state */
    .login-card.success {
      text-align: center;
    }

    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(34,197,94,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .success-icon svg {
      width: 28px;
      height: 28px;
      color: #22C55E;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
        border-radius: 16px;
      }

      .brand {
        margin-bottom: 36px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="brand">
      <img src="yara_butterfly.png" alt="Yara" />
      <span>Yara</span>
    </div>

    <div class="login-card" id="loginCard">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required autocomplete="current-password" />
        </div>

        <a href="#" class="forgot-link">Forgot password?</a>

        <div class="error-msg" id="errorMsg"></div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Sign In</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider"><span>or</span></div>

      <a href="/" class="back-link">Back to yaraserves.com</a>
    </div>
  </div>

  <script>
    const AUTH_ENDPOINT = 'https://yara-survey-api.netlify.app/.netlify/functions/authenticate';

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const loginCard = document.getElementById('loginCard');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        errorMsg.textContent = 'Please enter your email and password.';
        return;
      }

      // Show loading state
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const response = await fetch(AUTH_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const result = await response.json();

        if (response.ok && result.success) {
          // Store session
          sessionStorage.setItem('yara_auth', JSON.stringify({
            userId: result.userId,
            email: email,
            password: password,
            timestamp: result.timestamp,
          }));

          // Show success state
          loginCard.innerHTML = `
            <div style="text-align:center;">
              <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <h1 style="margin-bottom:8px;">Welcome back</h1>
              <p class="subtitle" style="margin-bottom:0;">Signed in as ${result.userId}</p>
            </div>
          `;

          // Redirect to admin after brief pause
          setTimeout(() => {
            window.location.href = '/admin.html';
          }, 1500);
        } else {
          errorMsg.textContent = result.message || 'Invalid email or password.';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection failed. Please try again.';
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });

    // Clear error on input
    emailInput.addEventListener('input', () => { errorMsg.textContent = ''; });
    passwordInput.addEventListener('input', () => { errorMsg.textContent = ''; });
  </script>

</body>
</html>
